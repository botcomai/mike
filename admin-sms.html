<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - SMS Broadcast</title>
    
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/admin-sms.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <!-- Supabase Database Connection --><script src="js/supabase.js"></script>
    <script src="js/security.js"></script>
</head>
<body>

    <div id="menu-container"></div>

    <div class="container">
        <div class="header">
            <h2>📢 Bulk SMS Broadcaster</h2>
            <p>Send a message directly to all verified users.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Verified Users</h3>
                <h1 id="userCount">0</h1>
            </div>
            <div class="stat-card remaining-credits">
                <h3>Available SMS Balance</h3>
                <h1 id="smsBalance">...</h1>
                <button onclick="checkSmsBalance()" class="refresh-btn">🔄 Refresh</button>
            </div>
        </div>

        <div class="broadcast-box">
            <label for="broadcastMessage">Compose Global Message</label>
            <textarea id="broadcastMessage" rows="5" placeholder="E.g: Dear Customers, MTN Bundle systems are fully operational again!"></textarea>
            
            <p class="char-count">Characters: <span id="charCount">0</span> (1 SMS = 160 chars)</p>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="status-text" id="progressStatus">Initializing broadcast...</p>

            <button class="send-btn" id="sendBtn" onclick="confirmBroadcast()">
                🚀 Dispatch to All Users
            </button>
        </div>

    </div>

    <script src="js/menu.js"></script>
    <script src="js/admin-sms.js"></script>
</body>
</html>
